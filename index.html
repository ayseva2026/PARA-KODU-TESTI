<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Kodunu Kesfet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e8e4f8 0%, #f5e6f0 40%, #e4eef8 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      color: #1a1a1a;
    }
    .card {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(120,100,200,0.13);
      border: 1px solid rgba(255,255,255,0.7);
      max-width: 640px;
      width: 100%;
      padding: 2.5rem 2rem;
    }
    .hero-img {
      width: 100%; height: 200px; object-fit: cover;
      border-radius: 14px; margin-bottom: 1.5rem;
    }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header-tag {
      display: inline-block;
      background: #ede9fb;
      color: #534AB7;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .header h1 { font-size: 26px; font-weight: 700; color: #2d2260; margin-bottom: 0.5rem; line-height: 1.3; }
    .header p { font-size: 15px; color: #666; line-height: 1.6; }
    .start-btn {
      display: block; width: 100%; margin-top: 1.8rem;
      padding: 15px; background: linear-gradient(135deg, #6c63d5, #a78bcc);
      color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .start-btn:hover { opacity: 0.9; }
    .progress-bg { height: 6px; background: #e8e4f8; border-radius: 3px; margin-bottom: 1.8rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63d5, #c084b8); border-radius: 3px; transition: width 0.4s ease; }
    .q-step { font-size: 12px; color: #9b8ec4; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
    .q-text { font-size: 18px; font-weight: 600; color: #2d2260; margin-bottom: 1.6rem; line-height: 1.55; }
    .opt {
      display: block; width: 100%; text-align: left;
      padding: 14px 18px; margin-bottom: 10px;
      background: rgba(255,255,255,0.85); border: 1.5px solid #ddd8f5;
      border-radius: 12px; font-size: 15px; color: #2d2260;
      cursor: pointer; transition: all 0.2s; line-height: 1.45;
    }
    .opt:hover { border-color: #7F77DD; background: #f0eeff; }
    .opt.selected { border-color: #534AB7; background: #e8e4fb; color: #3C3489; }
    .opt:disabled { cursor: default; }
    .profile-badge {
      display: inline-block; padding: 6px 16px;
      border-radius: 999px; font-size: 13px; font-weight: 600; margin-bottom: 1.2rem;
    }
    .profile-title { font-size: 24px; font-weight: 700; color: #2d2260; margin-bottom: 0.5rem; }
    .profile-sub { font-size: 15px; color: #555; line-height: 1.75; }
    .section-title {
      font-size: 11px; font-weight: 700; color: #9b8ec4;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 2rem 0 0.8rem;
    }
    .deep-box {
      padding: 20px 22px; border-radius: 14px;
      border: 1.5px solid #ddd8f5; background: rgba(232,228,248,0.4);
    }
    .deep-box p { font-size: 15px; color: #333; line-height: 1.8; margin-bottom: 12px; }
    .deep-box p:last-child { margin-bottom: 0; }
    .origin-box {
      padding: 16px 20px; border-left: 3px solid #a78bcc;
      background: rgba(245,230,240,0.4); border-radius: 0 10px 10px 0;
    }
    .origin-box p { font-size: 15px; color: #333; line-height: 1.75; }
    .belief-row { margin-bottom: 14px; }
    .belief-label { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 6px; }
    .belief-label span:last-child { font-weight: 600; color: #2d2260; }
    .bar-bg { height: 8px; background: #ede9f8; border-radius: 4px; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
    .codes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 0.6rem; }
    .code-card { padding: 14px 16px; border-radius: 12px; border: 1.5px solid #ddd8f5; background: rgba(255,255,255,0.6); }
    .code-card.active { border-width: 2px; }
    .code-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .code-pct { font-size: 24px; font-weight: 700; }
    .steps-list { margin: 0; padding: 0; list-style: none; }
    .steps-list li {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid #ede9f8;
      font-size: 15px; color: #333; line-height: 1.65;
    }
    .steps-list li:last-child { border-bottom: none; }
    .step-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .restart-btn {
      display: block; width: 100%; margin-top: 2rem;
      padding: 15px; background: linear-gradient(135deg, #6c63d5, #a78bcc);
      color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .restart-btn:hover { opacity: 0.9; }
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem 3rem; }
      .card { padding: 1.8rem 1.2rem; border-radius: 16px; }
      .header h1 { font-size: 22px; }
      .q-text { font-size: 17px; }
    }
  </style>
</head>
<body>
<div class="card">
  <div id="start-screen">
    <img class="hero-img" src="https://images.unsplash.com/photo-1559757175-7cb036e0d465?w=800&q=80" alt="Beyin ve bilincalti" />
    <div class="header">
      <div class="header-tag">Bilincalti Testi</div>
      <h1>Para Kodunu Kesfet</h1>
      <p>10 kisa soruyla bilincaltindaki para inancini ve finansal davranislarini sekillendiren derin kodu oren.</p>
      <button class="start-btn" onclick="startQuiz()">Teste Basla &rarr;</button>
    </div>
  </div>
  <div id="quiz-screen" style="display:none">
    <div class="progress-bg"><div class="progress-fill" id="prog" style="width:10%"></div></div>
    <div class="q-step" id="q-step">Soru 1 / 10</div>
    <div class="q-text" id="q-text"></div>
    <div id="opts"></div>
  </div>
  <div id="result-screen" style="display:none"></div>
</div>

<script>
var profiles = {
  K: {
    name: "Kitlik Savasçisi",
    color: "#993C1D", bg: "#FAECE7", border: "#D85A30",
    badge_bg: "#FAECE7", badge_color: "#993C1D",
    desc: "Para için sürekli savasiyorsun. Bilincaltinda 'yeterli olmaz' kodu aktif. Bu inanc seni hem asiri çalismaya hem de kazandigini hizla harcamaya yönlendirebilir.",
    deep: [
      "Kitlik savasçilari genellikle iki uç arasinda gidip gelir: ya asiri çalisir ve tükenir, ya da 'nasil olsa bitmeyecek' duygusuyla parayi elde kalir gelmez harcayarak sifirlarlar. Bu döngü bilincalti programinin yansímasidir.",
      "Paranin 'zor' olduguna dair inanc, zihne adeta bir filtre koyar. Bu filtre, kolayca gelen firsatlari görmemeni ya da 'bu kadar kolay olamaz' diyerek reddetmeni saglar."
    ],
    origin: "Bu kod çogunlukla maddi sikinti yasayan bir ailede büyümekten, 'para için ter dökülür' gibi tekrarlayan mesajlardan ya da çocuklukta para yüzünden yasanan çatismalari izlemekten beslenir.",
    steps: [
      "Her gün 5 dakika boyunca elinde olan seyleri sesli olarak say. Beyin bolluk kaniti aradiginda kitlik filtresini yumusatir.",
      "Harcadigini ya da kazandigini 'azaldi' yerine 'döndü' olarak yeniden çerçevele. Dil, bilincalti programlamayi dogrudan etkiler.",
      "Bir hafta boyunca her aldigin para için kisa bir minnetarlik notu yaz. Bu aliskanlik 'para gelir' nöral yolunu güçlendirir.",
      "Kendine sor: 'Bu karari bolluktan mi, korkudan mi aliyorum?' Farkindalik, otomatik kitlik tepkisini yavasslatir."
    ]
  },
  K2: {
    name: "Kontrolcü",
    color: "#185FA5", bg: "#E6F1FB", border: "#378ADD",
    badge_bg: "#E6F1FB", badge_color: "#185FA5",
    desc: "Para senin için kontrol ve güvenlik demek. Harcamak tehlikeli, biriktirmek ise hiçbir zaman yeterli hissettirmiyor. Bilincaltinda 'para kaybedilirse her sey biter' kodu çalisiyor.",
    deep: [
      "Kontrolcüler için para duygusal bir anlam tasir. Cüzdanlarindaki rakam azaldiginda sadece finansal degil, varoluşsal bir tehdit hissederler. Biriktirmek rahatlatmak yerine 'daha az kaygi' anlamina gelir; hiç bitmez.",
      "Paradoks sudur: ne kadar çok biriktirirsen, kaybetme korkusu o kadar büyür. Bilincalti 'tehlikeyi' para miktariyla degil, kontrolü kaybetme ihtimaliyle ölçer."
    ],
    origin: "Bu kod genellikle ani bir kayip yasayan (iflas, isten çikarilma) ya da ekonomik istikrarsizlik içinde büyüyen ailelerde sekillenir. 'Her sey bir anda gidebilir' dersi, beyne kalici bir alarm olarak kazinir.",
    steps: [
      "Finansal kararlarinda 'bu beni gerçekten güvende tutar mi, yoksa sadece kontrol hissimi mi tatmin eder?' diye sor.",
      "Küçük, planli bir harcama yap ve sonrasinda hislerini gözlemle. Kontrol kaybi degil, seçim gücü hissedebilirsin.",
      "Güvenlik duygusunu para disinda bir seye baglamayi dene: becerilerini, iliskilerini, uyum yetenegini.",
      "Her hafta bir konuda kontrolü bilinçli olarak birak. Bu, beynin kontrol=güvenlik denklemini yeniden yapilandirmasina yardimci olur."
    ]
  },
  H: {
    name: "Hak Etmeyici",
    color: "#3B6D11", bg: "#EAF3DE", border: "#639922",
    badge_bg: "#EAF3DE", badge_color: "#3B6D11",
    desc: "Derinlerde 'ben bunu hak etmiyorum' kodu var. Firsatlar geldiginde geri çekilir, basariya yaklastiginda onu sabote edebilirsin.",
    deep: [
      "Hak etmeyiciler çogunlukla çevrelerindeki insanlara son derece cömert davranirken kendilerine en temel seyleri bile çok görürler. Servet, bilincaltinda 'benim için degil' etiketiyle isaretlenmistir.",
      "Bu profildeki kisilerin en büyük tuzagi bilinçdisi sabotajdir. Basariya çok yaklastiklarinda farkinda olmadan firsatlari kaçiran kararlar alirlar."
    ],
    origin: "Bu kod en çok elestiri yogun ya da kosullu sevgi ortamlarinda büyüyen bireylerde görülür. 'Simirma', 'bizim yerimiz bu' gibi mesajlar, çocugun zihnine 'sen fazla degilsin' sablonunu isler.",
    steps: [
      "Her sabah kendine 'Bugün neyi hak ediyorum?' sorusunu sor ve en az 3 sey say.",
      "Birisi sana iyilik yaptiginda 'hayir gerek yok' demek yerine sadece 'tesekkür ederim' de. Almayi ögrenmek hak etme inancini yeniden insa eder.",
      "Geçmiste reddettigin bir firsati düsün. O an hak etmedigini mi hissettin? Bu soruyu dürüstçe yanitlamak kaliplari görünür kilar.",
      "Kendine maddi bir hedef belirle ve her gün 1 dakika o hedefe ulasmis halini görsellestin."
    ]
  },
  B: {
    name: "Bolluk Yaraticisi",
    color: "#534AB7", bg: "#EEEDFE", border: "#7F77DD",
    badge_bg: "#EEEDFE", badge_color: "#534AB7",
    desc: "Para senin için akista. Bilincaltinda 'yeterince var ve daha fazlasi geliyor' kodu güçlü. Ancak bu inanc zaman zaman plansiz harcamaya sürükleyebilir.",
    deep: [
      "Bolluk yaraticilari firsatlari çok daha kolay görür ve harekete geçer. Bu onlarin en büyük güçtür. Ancak 'her sey yoluna girer' inanci, uzun vadeli finansal planlama konusunda kör noktalar yaratabilir.",
      "Bolluk zihniyetinin sagiam finansal aliskanliklarla desteklenmesi gerekir. Gelen enerji dogru kanallara aktarilmadiginda servet birikmez, sadece döner."
    ],
    origin: "Bu kod genellikle parayi dogal ve nötr bir araç olarak gören, finansal konularda açik iletisim kuran ailelerde ya da erken yasta olumlu finansal deneyimler yasayan bireylerde gelisir.",
    steps: [
      "Bolluk enerjini somut bir finansal yapiyla destekle: aylik bütçe, acil fon ve uzun vadeli yatirim hedefleri belirle.",
      "Her büyük finansal karar öncesinde 'bu gerçekten deger yaratiyor mu?' sorusunu sor.",
      "Gelirinin en az yüzde onunu otomatik olarak birikimlere yönlendir. Bolluk zihniyeti + disiplinli sistem = kalici servet.",
      "Çevrene finansal bolluk zihniyetini aktar. Ögretmek inanci derinlestirir ve topluluk refahi kisisel refahi besler."
    ]
  }
};

var qs = [
  { q: "Beklenmedik bir ödeme geldiginde ilk hissin ne olur?", opts: [["Nasil harcayacagimi düsünürüm, zaten biter.", "K"], ["Güvende mi, dogru hesapta mi diye kontrol ederim.", "K2"], ["Neden bana geldi, hata mi var diye düsünürüm.", "H"], ["Minnetle kabul eder, hayatima nasil deger katacagini düsünürüm.", "B"]] },
  { q: "Bir arkadasin büyük bir servet edindiginde içinden ne geçer?", opts: [["Onlar sanslı, ben hep geride kalirim.", "K"], ["Acaba bu sürecekte mi, nasil koruyor?", "K2"], ["Keske ben de cesaret edebilseydim.", "H"], ["Harika! Bu benim için de mümkün oldugunu gösteriyor.", "B"]] },
  { q: "Para konusunda en çok hangi cümle sana tanik gelir?", opts: [["Para kazanmak çok zor.", "K"], ["Param oldugunda kendimi güvende hissederim.", "K2"], ["Ben zengin olmaya layik biri degilim.", "H"], ["Para gelir ve gider, önemli olan akista kalmak.", "B"]] },
  { q: "Büyük bir harcama yapmadan önce kendini nasil hissedersin?", opts: [["Endiselenip erteleyebilirim, ne olur ne olmaz.", "K"], ["Çok analiz eder, uzun süre karar veremem.", "K2"], ["'Bu kadar harcamayi hak ediyor muyum?' diye düsünürüm.", "H"], ["Deger katiyorsa keyifle yaparim.", "B"]] },
  { q: "Çocuklugunda para hakkinda en sik duydugun sey neydi?", opts: [["'Para agacinda bitmez', 'zor kazanilir'.", "K"], ["'Parayi iyi koru, yarin ne olur belli olmaz'.", "K2"], ["'Zenginler bize göre degil', 'bize fazlasi yakismaz'.", "H"], ["Para hayatin bir parçasidir, dogal bir sey.", "B"]] },
  { q: "Bir iste basariya çok yaklastiginda ne olur?", opts: [["Kazanirsam ne kadar sürer diye endisselenirim.", "K"], ["Kaybedecegimden korkar, siki tutunurum.", "K2"], ["Bir engel çikar ya da vazgeçirim.", "H"], ["Devam eder, bir sonraki adimi planlaririm.", "B"]] },
  { q: "Baskasina para vermen gerektiginde ne hissedersin?", opts: [["Içim sıkısır, azaliyor hissederim.", "K"], ["Her kurusu takip ederim.", "K2"], ["'Zaten çok az param var' derim.", "H"], ["Verebiliyorsam mutlu olurum, döner.", "B"]] },
  { q: "Para ile ilgili en büyük korkunuz hangisine daha yakin?", opts: [["Her seyi kaybetmek ve sifirdan baslamak.", "K"], ["Kontrolü kaybetmek, parayi yanlis yönetmek.", "K2"], ["Hiçbir zaman gerçekten refaha kavusamamak.", "H"], ["Parayi anlamsiz seylere harcayip degerleri kaçirmak.", "B"]] },
  { q: "Finansal hedef koydugunuzda genellikle ne olur?", opts: [["Baslarim ama hayat sekteye ugratir.", "K"], ["Çok detayli plan yapar ama baslamak zor olur.", "K2"], ["'Bu benim için olmayabilir' diyerek yarida birakarim.", "H"], ["Hedefe ulasiriim ya da yeni bir yol bulurum.", "B"]] },
  { q: "Para konusunda içindeki ses en çok ne söyler?", opts: [["'Hiçbir zaman yeterli olmayacak.'", "K"], ["'Her seyi kontrol altinda tutmaliyim.'", "K2"], ["'Ben bunu hak ediyor muyum?'", "H"], ["'Dogru zamanda dogru sey gelir.'", "B"]] }
];

var current = 0, scores = {K:0, K2:0, H:0, B:0};

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

function render() {
  var q = qs[current];
  document.getElementById('prog').style.width = ((current+1)/qs.length*100) + '%';
  document.getElementById('q-step').textContent = 'Soru ' + (current+1) + ' / ' + qs.length;
  document.getElementById('q-text').textContent = q.q;
  var opts = document.getElementById('opts');
  opts.innerHTML = '';
  var shuffled = q.opts.slice().sort(function(){ return Math.random()-0.5; });
  shuffled.forEach(function(item) {
    var b = document.createElement('button');
    b.className = 'opt';
    b.textContent = item[0];
    b.onclick = function(){ pick(b, item[1]); };
    opts.appendChild(b);
  });
}

function pick(btn, code) {
  document.querySelectorAll('.opt').forEach(function(b){ b.disabled = true; });
  btn.classList.add('selected');
  scores[code]++;
  setTimeout(function(){
    current++;
    if (current >= qs.length) showResult();
    else render();
  }, 500);
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  var rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  var total = Object.values(scores).reduce(function(a,b){ return a+b; }, 0);
  var sorted = Object.entries(scores).sort(function(a,b){ return b[1]-a[1]; });
  var topCode = sorted[0][0];
  var p = profiles[topCode];
  var pcts = {};
  sorted.forEach(function(item){ pcts[item[0]] = Math.round(item[1]/total*100); });
  var barColors = {K:"#D85A30", K2:"#378ADD", H:"#639922", B:"#534AB7"};
  var beliefs = [
    {label:"Kitlik inanci", code:"K"},
    {label:"Kontrol ihtiyaci", code:"K2"},
    {label:"Hak etmeme inanci", code:"H"},
    {label:"Bolluk inanci", code:"B"}
  ];

  rs.innerHTML =
    '<span class="profile-badge" style="background:'+p.badge_bg+';color:'+p.badge_color+'">'+p.name+'</span>' +
    '<div class="profile-title">Baskin Para Kodun: '+p.name+'</div>' +
    '<div class="profile-sub">'+p.desc+'</div>' +
    '<div class="section-title">Derin Analiz</div>' +
    '<div class="deep-box">'+p.deep.map(function(d){ return '<p>'+d+'</p>'; }).join('')+'</div>' +
    '<div class="section-title">Bu Kod Nerede Olusstu?</div>' +
    '<div class="origin-box"><p>'+p.origin+'</p></div>' +
    '<div class="section-title">Bilincalti Inanç Haritan</div>' +
    beliefs.map(function(b){
      return '<div class="belief-row"><div class="belief-label"><span>'+b.label+'</span><span>'+pcts[b.code]+'%</span></div><div class="bar-bg"><div class="bar-fill" style="width:0%;background:'+barColors[b.code]+'" data-w="'+pcts[b.code]+'"></div></div></div>';
    }).join('') +
    '<div class="codes-grid">' +
    sorted.map(function(item){
      var c = item[0]; var pr = profiles[c]; var isTop = c===topCode;
      return '<div class="code-card'+(isTop?' active':'')+'" style="background:'+(isTop?pr.bg:'rgba(255,255,255,0.6)')+';border-color:'+(isTop?pr.border:'#ddd8f5')+'"><div class="code-name" style="color:'+pr.color+'">'+pr.name+'</div><div class="code-pct" style="color:'+(isTop?pr.color:'#aaa')+'">'+pcts[c]+'%</div></div>';
    }).join('') +
    '</div>' +
    '<div class="section-title">Dönüsüm Adimlari</div>' +
    '<ul class="steps-list">' +
    p.steps.map(function(s,i){
      return '<li><span class="step-num" style="background:'+p.bg+';color:'+p.color+'">'+(i+1)+'</span><span>'+s+'</span></li>';
    }).join('') +
    '</ul>' +
    '<button class="restart-btn" onclick="restart()">Testi Yeniden Basslat</button>';

  setTimeout(function(){
    document.querySelectorAll('.bar-fill').forEach(function(el){
      el.style.width = el.getAttribute('data-w') + '%';
    });
  }, 150);
}

function restart() {
  current = 0; scores = {K:0, K2:0, H:0, B:0};
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}
</script>
</body>
</html>
